---
# ─────────────────────────────────────────────────────────────────────────────
# System
# ─────────────────────────────────────────────────────────────────────────────
hostname: m1max.ericwall.me
computer_name: m1max
local_hostname: m1max
timezone: America/Chicago
admin_user: ericwall

# ─────────────────────────────────────────────────────────────────────────────
# SSH
# ─────────────────────────────────────────────────────────────────────────────
ssh_port: 22
ssh_key_type: ed25519

# ─────────────────────────────────────────────────────────────────────────────
# Homebrew — CLI packages
# ─────────────────────────────────────────────────────────────────────────────
homebrew_packages:
  - git
  - curl
  - wget
  - htop
  - tmux
  - jq
  - tree
  - neovim
  - ripgrep
  - fd
  - bat
  - fzf
  - zoxide
  - watch
  - gnu-sed
  - coreutils
  - nginx
  - cocoapods
  - kdoctor

# ─────────────────────────────────────────────────────────────────────────────
# Homebrew — Cask (GUI) packages
# ─────────────────────────────────────────────────────────────────────────────
homebrew_cask_packages:
  - android-commandlinetools

# ─────────────────────────────────────────────────────────────────────────────
# Development languages / runtimes
# ─────────────────────────────────────────────────────────────────────────────
dev_languages:
  - python@3.12
  - node
  - go
  - rust
  - openjdk

# ─────────────────────────────────────────────────────────────────────────────
# Networking — Tailscale
# ─────────────────────────────────────────────────────────────────────────────
enable_tailscale: false

# ─────────────────────────────────────────────────────────────────────────────
# Networking — Cloudflare Tunnel
# ─────────────────────────────────────────────────────────────────────────────
enable_cloudflared: true
cloudflared_tunnel_name: m1max

# ─────────────────────────────────────────────────────────────────────────────
# Build Server — Forgejo Actions Runner
# ─────────────────────────────────────────────────────────────────────────────
forgejo_instance_url: https://forgejo.ericwall.me
forgejo_runner_labels: "macos-arm64:host"

# ─────────────────────────────────────────────────────────────────────────────
# AI Research — Ollama
# ─────────────────────────────────────────────────────────────────────────────
ollama_default_models:
  - gemma4:12b
  - nomic-embed-text

# ─────────────────────────────────────────────────────────────────────────────
# Observability — Grafana / Prometheus / Node Exporter
# ─────────────────────────────────────────────────────────────────────────────
grafana_port: 3000
prometheus_port: 9090
node_exporter_port: 9100

# ─────────────────────────────────────────────────────────────────────────────
# Remote Desktop — VNC
# ─────────────────────────────────────────────────────────────────────────────
# Store the real password in an Ansible Vault-encrypted file:
#   ansible-vault create group_vars/vault.yml
#   → vnc_password: "your-secure-password"
vnc_password: "{{ vault_vnc_password }}"

# ─────────────────────────────────────────────────────────────────────────────
# Reverse Proxy — nginx
# ─────────────────────────────────────────────────────────────────────────────
nginx_enabled: true

# ─────────────────────────────────────────────────────────────────────────────
# Forgejo Server
# ─────────────────────────────────────────────────────────────────────────────
forgejo_port: 3002

# ─────────────────────────────────────────────────────────────────────────────
# Immich Server
# ─────────────────────────────────────────────────────────────────────────────
immich_port: 2283
immich_db_password: postgres

# ─────────────────────────────────────────────────────────────────────────────
# Jellyfin Server
# ─────────────────────────────────────────────────────────────────────────────
jellyfin_port: 8096

