---
# roles/build_server/defaults/main.yml
# Default variables for the build_server role

# Forgejo Runner binary download URL (darwin-arm64)
forgejo_runner_url: "https://dl.gitea.com/gitea-runner/1.0.8/gitea-runner-1.0.8-darwin-arm64"

# Forgejo instance URL for runner registration
forgejo_instance_url: "https://your-forgejo-instance.example.com"

# Forgejo runner labels (comma-separated label:image pairs)
forgejo_runner_labels: "docker:docker://node:20-bookworm,ubuntu-latest:docker://ubuntu:22.04"
