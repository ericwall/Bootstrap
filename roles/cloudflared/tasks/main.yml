---
# roles/cloudflared/tasks/main.yml
# Cloudflare Tunnel installation and configuration

- name: Install cloudflared via Homebrew
  community.general.homebrew:
    name: cloudflared
    state: present
  when: enable_cloudflared | default(false)
  tags:
    - cloudflared

- name: Create cloudflared config directory
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.cloudflared"
    state: directory
    mode: "0700"
  when: enable_cloudflared | default(false)
  tags:
    - cloudflared

- name: Deploy cloudflared config file
  ansible.builtin.template:
    src: config.yml.j2
    dest: "{{ ansible_facts.env.HOME }}/.cloudflared/config.yml"
    mode: "0600"
  when: enable_cloudflared | default(false)
  tags:
    - cloudflared

- name: Deploy cloudflared LaunchAgent plist
  ansible.builtin.template:
    src: com.cloudflare.cloudflared.plist.j2
    dest: "{{ ansible_facts.env.HOME }}/Library/LaunchAgents/com.cloudflare.cloudflared.plist"
    mode: "0644"
  when: enable_cloudflared | default(false)
  tags:
    - cloudflared

- name: Load cloudflared LaunchAgent
  ansible.builtin.command:
    cmd: launchctl load {{ ansible_facts.env.HOME }}/Library/LaunchAgents/com.cloudflare.cloudflared.plist
  register: cloudflared_launchctl_result
  changed_when: cloudflared_launchctl_result.rc == 0
  failed_when: false
  when: enable_cloudflared | default(false)
  tags:
    - cloudflared

- name: Display cloudflared post-install instructions
  ansible.builtin.debug:
    msg: |
      ============================================================
      CLOUDFLARED POST-INSTALL STEPS (manual, one-time only):

        1. Authenticate with Cloudflare:
           cloudflared tunnel login

        2. Create the tunnel:
           cloudflared tunnel create {{ cloudflared_tunnel_name }}

        3. Configure DNS routes in the Cloudflare dashboard
           or via the CLI:
           cloudflared tunnel route dns {{ cloudflared_tunnel_name }} {{ hostname }}
           cloudflared tunnel route dns {{ cloudflared_tunnel_name }} grafana.{{ hostname }}

        4. Restart the LaunchAgent:
           launchctl unload ~/Library/LaunchAgents/com.cloudflare.cloudflared.plist
           launchctl load ~/Library/LaunchAgents/com.cloudflare.cloudflared.plist
      ============================================================
  when: enable_cloudflared | default(false)
  tags:
    - cloudflared
