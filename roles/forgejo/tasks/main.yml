---
# roles/forgejo/tasks/main.yml
# Installs and configures Forgejo (Git server) in Docker via Colima

- name: Ensure Forgejo directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.forgejo"
    state: directory
    mode: "0755"
  tags:
    - forgejo

- name: Ensure Forgejo local database directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.forgejo/db"
    state: directory
    mode: "0777"
  tags:
    - forgejo

- name: Deploy Forgejo docker-compose configuration
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ ansible_env.HOME }}/.forgejo/docker-compose.yml"
    mode: "0644"
  register: forgejo_compose_config
  tags:
    - forgejo

- name: Start Forgejo container
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/docker-compose up -d
    chdir: "{{ ansible_env.HOME }}/.forgejo"
  when: forgejo_compose_config.changed
  changed_when: true
  tags:
    - forgejo

- name: Ensure Forgejo is started (if config not changed)
  ansible.builtin.command:
    cmd: /opt/homebrew/bin/docker-compose up -d
    chdir: "{{ ansible_env.HOME }}/.forgejo"
  register: forgejo_start
  changed_when: "'Started' in forgejo_start.stdout or 'Created' in forgejo_start.stdout or 'Recreated' in forgejo_start.stdout"
  when: not forgejo_compose_config.changed
  tags:
    - forgejo

# --- Automated NAS Database Backup ---

- name: Deploy Forgejo SQLite database backup script
  ansible.builtin.template:
    src: backup.sh.j2
    dest: "{{ ansible_env.HOME }}/.forgejo/backup.sh"
    mode: "0755"
  tags:
    - forgejo

- name: Deploy Forgejo database backup LaunchAgent
  ansible.builtin.template:
    src: com.forgejo.backup.plist.j2
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.forgejo.backup.plist"
    mode: "0644"
  register: forgejo_backup_agent
  tags:
    - forgejo

- name: Unload Forgejo backup LaunchAgent (if changed)
  ansible.builtin.command:
    cmd: launchctl unload {{ ansible_env.HOME }}/Library/LaunchAgents/com.forgejo.backup.plist
  when: forgejo_backup_agent.changed
  changed_when: true
  failed_when: false
  tags:
    - forgejo

- name: Load Forgejo backup LaunchAgent
  ansible.builtin.command:
    cmd: launchctl load {{ ansible_env.HOME }}/Library/LaunchAgents/com.forgejo.backup.plist
  register: load_backup_agent
  changed_when: forgejo_backup_agent.changed
  failed_when:
    - load_backup_agent.rc != 0
    - "'already loaded' not in (load_backup_agent.stderr | default(''))"
    - "'service already loaded' not in (load_backup_agent.stderr | default(''))"
  tags:
    - forgejo
