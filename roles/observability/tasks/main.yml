---
# roles/observability/tasks/main.yml
# Installs and configures node_exporter, Prometheus, and Grafana on macOS (Apple Silicon)

# ── Node Exporter ────────────────────────────────────────────────────────────

- name: Install node_exporter
  community.general.homebrew:
    name: node_exporter
    state: present
  tags:
    - observability

- name: Configure node_exporter LaunchAgent
  ansible.builtin.template:
    src: org.prometheus.node_exporter.plist.j2
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/org.prometheus.node_exporter.plist"
    mode: "0644"
  register: node_exporter_plist
  tags:
    - observability

- name: Unload node_exporter LaunchAgent before reload
  ansible.builtin.command:
    cmd: launchctl unload {{ ansible_env.HOME }}/Library/LaunchAgents/org.prometheus.node_exporter.plist
  when: node_exporter_plist.changed
  changed_when: true
  failed_when: false
  tags:
    - observability

- name: Load node_exporter LaunchAgent
  ansible.builtin.command:
    cmd: launchctl load {{ ansible_env.HOME }}/Library/LaunchAgents/org.prometheus.node_exporter.plist
  register: node_exporter_load
  changed_when: node_exporter_plist.changed
  failed_when:
    - node_exporter_load.rc != 0
    - "'already loaded' not in (node_exporter_load.stderr | default(''))"
    - "'service already loaded' not in (node_exporter_load.stderr | default(''))"
  tags:
    - observability

# ── Prometheus ───────────────────────────────────────────────────────────────

- name: Install Prometheus
  community.general.homebrew:
    name: prometheus
    state: present
  tags:
    - observability

- name: Create Prometheus data directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.prometheus/data"
    state: directory
    mode: "0755"
  tags:
    - observability

- name: Deploy Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ ansible_env.HOME }}/.prometheus/prometheus.yml"
    mode: "0644"
  register: prometheus_config
  tags:
    - observability

- name: Configure Prometheus LaunchAgent
  ansible.builtin.template:
    src: org.prometheus.prometheus.plist.j2
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/org.prometheus.prometheus.plist"
    mode: "0644"
  register: prometheus_plist
  tags:
    - observability

- name: Unload Prometheus LaunchAgent before reload
  ansible.builtin.command:
    cmd: launchctl unload {{ ansible_env.HOME }}/Library/LaunchAgents/org.prometheus.prometheus.plist
  when: prometheus_plist.changed or prometheus_config.changed
  changed_when: true
  failed_when: false
  tags:
    - observability

- name: Load Prometheus LaunchAgent
  ansible.builtin.command:
    cmd: launchctl load {{ ansible_env.HOME }}/Library/LaunchAgents/org.prometheus.prometheus.plist
  register: prometheus_load
  changed_when: prometheus_plist.changed or prometheus_config.changed
  failed_when:
    - prometheus_load.rc != 0
    - "'already loaded' not in (prometheus_load.stderr | default(''))"
    - "'service already loaded' not in (prometheus_load.stderr | default(''))"
  tags:
    - observability

# ── Grafana ──────────────────────────────────────────────────────────────────

- name: Install Grafana
  community.general.homebrew:
    name: grafana
    state: present
  tags:
    - observability

- name: Create Grafana provisioning directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ ansible_env.HOME }}/.grafana/provisioning/datasources"
    - "{{ ansible_env.HOME }}/.grafana/provisioning/dashboards"
  tags:
    - observability

- name: Deploy Grafana datasource provisioning config
  ansible.builtin.copy:
    src: grafana-datasource.yml
    dest: "{{ ansible_env.HOME }}/.grafana/provisioning/datasources/datasource.yml"
    mode: "0644"
  register: grafana_datasource
  tags:
    - observability

- name: Configure Grafana LaunchAgent
  ansible.builtin.template:
    src: com.grafana.server.plist.j2
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.grafana.server.plist"
    mode: "0644"
  register: grafana_plist
  tags:
    - observability

- name: Unload Grafana LaunchAgent before reload
  ansible.builtin.command:
    cmd: launchctl unload {{ ansible_env.HOME }}/Library/LaunchAgents/com.grafana.server.plist
  when: grafana_plist.changed or grafana_datasource.changed
  changed_when: true
  failed_when: false
  tags:
    - observability

- name: Load Grafana LaunchAgent
  ansible.builtin.command:
    cmd: launchctl load {{ ansible_env.HOME }}/Library/LaunchAgents/com.grafana.server.plist
  register: grafana_load
  changed_when: grafana_plist.changed or grafana_datasource.changed
  failed_when:
    - grafana_load.rc != 0
    - "'already loaded' not in (grafana_load.stderr | default(''))"
    - "'service already loaded' not in (grafana_load.stderr | default(''))"
  tags:
    - observability

# ── Summary ──────────────────────────────────────────────────────────────────

- name: Display observability stack access info
  ansible.builtin.debug:
    msg:
      - "═══════════════════════════════════════════════════"
      - "  Observability Stack Running"
      - "═══════════════════════════════════════════════════"
      - "  Node Exporter : http://localhost:{{ node_exporter_port }}/metrics"
      - "  Prometheus    : http://localhost:{{ prometheus_port }}"
      - "  Grafana       : http://localhost:{{ grafana_port }}"
      - "                  (default login: admin / admin)"
      - "═══════════════════════════════════════════════════"
  tags:
    - observability
