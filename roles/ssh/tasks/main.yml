---
# roles/ssh/tasks/main.yml
# SSH setup and hardening for macOS server

- name: Check if Remote Login is enabled
  ansible.builtin.command:
    cmd: systemsetup -getremotelogin
  become: true
  register: remote_login_status
  changed_when: false
  check_mode: false
  tags:
    - ssh

- name: Enable Remote Login (SSH)
  ansible.builtin.command:
    cmd: launchctl load -w /System/Library/LaunchDaemons/ssh.plist
  become: true
  when: "'On' not in remote_login_status.stdout"
  changed_when: true
  tags:
    - ssh

- name: Ensure .ssh directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.ssh"
    state: directory
    mode: "0700"
    owner: "{{ ansible_env.USER }}"
  tags:
    - ssh

- name: Generate SSH keypair
  ansible.builtin.command:
    cmd: >-
      ssh-keygen -t {{ ssh_key_type }}
      -f {{ ansible_env.HOME }}/.ssh/id_{{ ssh_key_type }}
      -N ''
      -C '{{ ansible_env.USER }}@{{ hostname }}'
    creates: "{{ ansible_env.HOME }}/.ssh/id_{{ ssh_key_type }}"
  register: ssh_keygen_result
  changed_when: ssh_keygen_result.rc == 0
  tags:
    - ssh

- name: Ensure authorized_keys file exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.ssh/authorized_keys"
    state: touch
    mode: "0600"
    owner: "{{ ansible_env.USER }}"
    modification_time: preserve
    access_time: preserve
  tags:
    - ssh

- name: Read generated public key
  ansible.builtin.slurp:
    src: "{{ ansible_env.HOME }}/.ssh/id_{{ ssh_key_type }}.pub"
  register: ssh_public_key
  tags:
    - ssh

- name: Add generated public key to authorized_keys
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.ssh/authorized_keys"
    line: "{{ ssh_public_key.content | b64decode | trim }}"
    state: present
    create: false
  tags:
    - ssh

- name: Harden sshd_config — PasswordAuthentication no
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*PasswordAuthentication\s+'
    line: "PasswordAuthentication no"
    validate: /usr/sbin/sshd -t -f %s
  become: true
  notify: Restart sshd
  tags:
    - ssh

- name: Harden sshd_config — PermitRootLogin no
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*PermitRootLogin\s+'
    line: "PermitRootLogin no"
    validate: /usr/sbin/sshd -t -f %s
  become: true
  notify: Restart sshd
  tags:
    - ssh

- name: Harden sshd_config — PubkeyAuthentication yes
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*PubkeyAuthentication\s+'
    line: "PubkeyAuthentication yes"
    validate: /usr/sbin/sshd -t -f %s
  become: true
  notify: Restart sshd
  tags:
    - ssh

- name: Harden sshd_config — ChallengeResponseAuthentication no
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*ChallengeResponseAuthentication\s+'
    line: "ChallengeResponseAuthentication no"
    validate: /usr/sbin/sshd -t -f %s
  become: true
  notify: Restart sshd
  tags:
    - ssh

- name: Harden sshd_config — UsePAM yes
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*UsePAM\s+'
    line: "UsePAM yes"
    validate: /usr/sbin/sshd -t -f %s
  become: true
  notify: Restart sshd
  tags:
    - ssh
